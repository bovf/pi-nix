# yamllint disable rule:line-length rule:document-start
stages:
  - mirror

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  GITHUB_MIRROR_REPO: bovf/pi-nix
  CODEBERG_MIRROR_REPO: bovfbovf/pi-nix

mirror:main:
  stage: mirror
  tags:
    - nix-cache
  resource_group: main-mirror-push
  timeout: 30m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - |
      set -euo pipefail

      git checkout -B "$CI_DEFAULT_BRANCH" "origin/$CI_DEFAULT_BRANCH"

      github_url="${GITHUB_MIRROR_URL:-}"
      if [ -z "$github_url" ]; then
        : "${GITHUB_TOKEN:?Set GITHUB_TOKEN or GITHUB_MIRROR_URL for mirroring}"
        github_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_MIRROR_REPO}.git"
      fi

      codeberg_url="${CODEBERG_MIRROR_URL:-}"
      if [ -z "$codeberg_url" ]; then
        : "${CODEBERG_TOKEN:?Set CODEBERG_TOKEN or CODEBERG_MIRROR_URL for mirroring}"
        codeberg_url="https://bovfbovf:${CODEBERG_TOKEN}@codeberg.org/${CODEBERG_MIRROR_REPO}.git"
      fi

      echo "Pushing $CI_DEFAULT_BRANCH to GitHub mirror"
      git push --force "$github_url" "$CI_DEFAULT_BRANCH:$CI_DEFAULT_BRANCH"

      echo "Pushing $CI_DEFAULT_BRANCH to Codeberg mirror"
      git push --force "$codeberg_url" "$CI_DEFAULT_BRANCH:$CI_DEFAULT_BRANCH"
