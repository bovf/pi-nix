# yamllint disable rule:line-length rule:document-start
stages:
  - mirror

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"
  GITHUB_MIRROR_REPO: bovf/pi-nix
  CODEBERG_MIRROR_REPO: bovfbovf/pi-nix

mirror:main:
  stage: mirror
  tags:
    - nix-cache
  resource_group: main-mirror-push
  timeout: 30m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - |
      set -euo pipefail

      git checkout -B "$CI_DEFAULT_BRANCH" "origin/$CI_DEFAULT_BRANCH"

      github_url="${GITHUB_MIRROR_URL:-}"
      if [ -z "$github_url" ] && [ -n "${GITHUB_TOKEN:-}" ]; then
        github_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_MIRROR_REPO}.git"
      fi

      codeberg_url="${CODEBERG_MIRROR_URL:-}"
      if [ -z "$codeberg_url" ] && [ -n "${CODEBERG_TOKEN:-}" ]; then
        codeberg_url="https://bovfbovf:${CODEBERG_TOKEN}@codeberg.org/${CODEBERG_MIRROR_REPO}.git"
      fi

      mirror_push() {
        local name="$1"
        local url="$2"

        if [ -z "$url" ]; then
          echo "Skipping $name mirror; URL/token variable is not configured."
          return 0
        fi

        echo "Pushing $CI_DEFAULT_BRANCH to $name mirror"
        git push --force "$url" "$CI_DEFAULT_BRANCH:$CI_DEFAULT_BRANCH"
      }

      mirror_push github "$github_url"
      mirror_push codeberg "$codeberg_url"
